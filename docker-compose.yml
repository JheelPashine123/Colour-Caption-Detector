services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colour-detection-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: colour-detection-frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      WDS_SOCKET_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
